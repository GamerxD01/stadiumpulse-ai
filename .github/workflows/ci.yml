name: CI — StadiumPulse AI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend — Python type-check, lint, and test suite with coverage
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: pip install ruff && ruff check backend/

      - name: Type-check with mypy
        run: pip install mypy && mypy --config-file mypy.ini -p backend

      - name: Run tests with coverage
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOMINATIM_USER_AGENT: StadiumPulseAI/1.0
          OPEN_METEO_BASE_URL: https://api.open-meteo.com/v1
        run: |
          pip install pytest-cov
          PYTHONPATH=. pytest --cov=backend --cov-report=term-missing --cov-fail-under=90 -q

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend — lint and Vitest test suite
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node/Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm run test -- --run
